info:
  name: 2FA_COMPLETION
  type: http
  seq: 14

http:
  method: POST
  url: "{{local_base_url}}/identity/auth/verify-mfa/challenge/"
  params:
    - name: otp
      value: "755710"
      type: query
      disabled: true
    - name: token
      value: sd
      type: query
      disabled: true
  body:
    type: form-urlencoded
    data:
      - name: otp
        value: "497812"
      - name: ""
        value: eewe
        disabled: true
  auth:
    type: bearer
    token: "{{challenge_access}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        // Parse response safely
        let responseBody = {};
        try {
          responseBody = res.getBody();
        } catch (e) {
          responseBody = {};
        }

        // --- Basic assertions ---
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("Content-Type") || "").to.match(/application\/json/i);
        });

        // --- Token extraction (backward compatible) ---
        // Supported shapes:
        // 1) NEW: { access_token: { token: "...", exp: "..." }, refresh_token: "..." }
        // 2) OLD: { access_token: "...", refresh_token: "..." }
        // 3) OLD: { tokens: { access_token: "...", refresh_token: "..." } }
        // 4) OLD: { access_token: "..." } or { tokens: { access_token: "..." } }

        const success = responseBody.success === true;

        let accessToken;
        let accessTokenExp;

        // access_token can be string or object { token, exp }
        if (typeof responseBody.access_token === "string") {
          accessToken = responseBody.access_token;
        } else if (responseBody.access_token && typeof responseBody.access_token === "object") {
          accessToken = responseBody.access_token.token;
          accessTokenExp = responseBody.access_token.exp;
        }

        // tokens.access_token fallback
        if (!accessToken) {
          accessToken = responseBody?.tokens?.access_token;
        }

        // exp might also exist in nested tokens shape (best-effort)
        if (!accessTokenExp) {
          accessTokenExp = responseBody?.tokens?.access_token_exp || responseBody?.tokens?.exp;
        }

        // refresh_token can be string or nested
        const refreshToken = responseBody.refresh_token || responseBody?.tokens?.refresh_token;

        // Store tokens in ACTIVE ENVIRONMENT if login was successful
        if (success) {
          if (accessToken) {
            bru.setEnvVar("access_token", accessToken);
          }

          if (refreshToken) {
            bru.setEnvVar("refresh_token", refreshToken);
          }

          // Optional: store exp too if present
          if (accessTokenExp) {
            bru.setEnvVar("access_token_exp", accessTokenExp);
          }
        }

        // Keep existing challenge_token handling
        if (responseBody.challenge_token) {
          bru.setEnvVar("challenge_access", responseBody.challenge_token);
        }

        // --- Assertions that token was captured when success is true ---
        test("When success=true, access_token is present", function () {
          if (success) {
            expect(accessToken, "Expected access_token to be present when success=true").to.be.a("string").and.not.be.empty;
          } else {
            // Don't fail the test suite for non-success responses
            expect(true).to.equal(true);
          }
        });

