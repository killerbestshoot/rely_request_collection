docs: |-
  ### Overview

  Returns the currently authenticated user’s profile and related information, including basic user fields plus nested contact, document, role, recent activity, and KYC verification status. Use this endpoint to fetch the logged-in user’s full account context based on the active access token.

  ### Authentication

  - This endpoint **requires authorization** via a Bearer token.
      
  - Include the token in the `Authorization` header as:
      
      ``` http
        Authorization: Bearer {{access_token}}
      
       ```
      

  ### Request details

  - **Method:** `GET`
      
  - **URL:** `{{local_base_url}}/v1/user/show/`
      
  - **Request body:** None. No body fields are required.
      
  - The only required input is a valid access token passed in the `Authorization` header.
      

  ---

  **Example 200 response:**

  ``` json
