info:
  name: RESEND_VERIFICATION_OTP
  type: http
  seq: 20

http:
  method: POST
  url: "{{local_base_url}}/auth/resend-verification-otp/"
  body:
    type: form-urlencoded
    data:
      - name: username
        value: Nance_1998
      - name: email
        value: "{{usermail}}"
      - name: password
        value: "{{userpass}}"
      - name: account_type
        value: standard
      - name: user_gender
        value: male
  auth:
    type: bearer
    token: "{{registration_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
