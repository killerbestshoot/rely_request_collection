info:
  name: check_auth
  type: http
  seq: 6

http:
  method: GET
  url: "{{local_base_url}}/identity/auth/me/"
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          pm.response.to.be.json;
        });

        test("Response has expected auth fields", function () {
          const jsonData = res.getBody();
          expect(jsonData).to.be.an("object");

          // allow either snake_case or camelCase depending on backend
          expect(
            jsonData,
            "Expected user id in response (data.user_id or data.userId)"
          ).to.satisfy(function (obj) {
            return (
              (obj.data && typeof obj.data.user_id === "string" && obj.data.user_id.length > 0) ||
              (obj.data && typeof obj.data.userId === "string" && obj.data.userId.length > 0)
            );
          });

          // token-related fields commonly returned by /auth/me
          if (jsonData.data) {
            if (jsonData.data.token_type !== undefined) {
              expect(jsonData.data.token_type).to.be.a("string");
            }
            if (jsonData.data.scope !== undefined) {
              expect(jsonData.data.scope).to.be.an("array");
            }
            if (jsonData.data.scopes !== undefined) {
              expect(jsonData.data.scopes).to.be.an("array");
            }
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

