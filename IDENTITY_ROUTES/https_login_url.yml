docs: |-
  ### Login – Authenticate User

  Authenticates an existing user and returns access and refresh tokens.

  **URL**  
  `POST {{local_base_url}}/v1/login/`

  **Method**  
  `POST`

  **Authentication**

  - This endpoint does **not** require an existing access token.
      
  - It is typically used to obtain new tokens using valid user credentials.
      

  **Required body (x-www-form-urlencoded)**

  - `email` – User email address associated with the account
      
  - `password` – Account password
      

  **Typical successful response**

  - **Status:** `200 OK`
      
  - **Body (JSON):**
      
      - `success` – Boolean, `true` when login is successful
          
      - `tokens.access_token` – Short‑lived token used to authenticate subsequent API calls
          
      - `tokens.refresh_token` – Longer‑lived token used to obtain new access tokens
          
      - Other response fields may include additional user or session information depending on server configuration
          

  **Example (200 OK)**

  ``` json
  {
    "success": true,
    "tokens": {
      "access_token": "<jwt-access-token>",
      "refresh_token": "<jwt-refresh-token>"
    }
  }

   ```

  **Error responses / Notes**

  - **403 Forbidden – Account not verified**
      
      - Example body:
          
          ``` json
                  {
                    "success": false,
                    "hint": "Unable to log in. 🚫",
                    "details": "Account is not verified.",
                    "error_code": 3006
                  }
          
           ```
          
      - This typically indicates the user must verify their account (for example, via email) before logging in.
          
  - **401 Forbidden – Invalid email or password.**
      
      - Example body:
          
          ``` json
                  {
                    "success": false,
                    "hint": "Unable to log in. 🚫",
                    "details": "Invalid email or password.",
                    "error_code": 3001
                  }
          
           ```
          
      - This typically indicates the user must provides the correct credentials (email, password) before logging in.
          

  - Other 4xx responses may occur for invalid credentials or malformed input. Check the response body for additional error details.
