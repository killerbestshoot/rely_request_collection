http:
  method: POST
  url: "{{local_base_url}}/identity/auth/login/"
  body:
    type: form-urlencoded
    data:
      - name: email
        value: "{{usermail}}"
      - name: password
        value: "{{userpass}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        let deviceName = "Unknown";
        let osName = "Unknown";
        let osVersion = "Unknown";
        let appName = "Bruno";
        let arch = "Unknown";

        try {
          const os = require("os");

          const platform = os.platform();
          const platformNames = {
            darwin: "macOS",
            win32: "Windows",
            linux: "Linux",
          };

          osName = platformNames[platform] || platform;
          osVersion = os.release();
          arch = os.arch();
          deviceName = os.hostname() || `${osName} ${arch}`;
        } catch (error) {
          console.log("OS module unavailable:", error.message);

          try {
            const platform = req.getExecutionPlatform && req.getExecutionPlatform();
            deviceName = platform ? `Bruno ${platform}` : "Bruno Client";
          } catch (_) {
            deviceName = "Bruno Client";
          }
        }

        req.setHeaders({
          "Content-Type": "application/x-www-form-urlencoded",
          "X-Device-Name": deviceName,
          "X-OS-Name": osName,
          "X-OS-Version": osVersion,
          "X-App-Name": appName,
          "X-Device-Arch": arch,
        });

        console.log("Device headers attached:", {
          deviceName,
          osName,
          osVersion,
          appName,
          arch,
        });
    - type: after-response
      code: |-
        // parse the response to extract the access_token
        const responseBody = res.getBody();
        if (responseBody.success === true) {
            const token = responseBody.access_token.token || responseBody?.tokens?.access_token;

            if (token) {
                bru.setEnvVar("access_token", token);
                const refresh = responseBody.refresh_token || responseBody?.tokens?.refresh_token;
                if (refresh) bru.setEnvVar("refresh_token", refresh);
            }
        }

        // Store the challenge_token in the ACTIVE ENVIRONMENT if it exists
        if (responseBody.challenge_token) {
            bru.setEnvVar("challenge_access", responseBody.challenge_token);
        }

