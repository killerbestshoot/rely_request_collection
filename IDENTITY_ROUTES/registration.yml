info:
  name: registration
  type: http
  seq: 1

http:
  method: POST
  url: "{{local_base_url}}/auth/register/"
  body:
    type: form-urlencoded
    data:
      - name: username
        value: Nance_1998
      - name: email
        value: "{{usermail}}"
      - name: password
        value: "{{userpass}}"
      - name: account_type
        value: standard
      - name: user_gender
        value: male
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const res = res.getBody();

        bru.setEnvVar(
            "registration_token",
            res?.result?.verification?.registration_token?.token || ""
        );

        bru.setEnvVar(
            "challenge_id",
            res?.result?.verification?.challenge_id || ""
        );

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

