docs: |-
  ### Registration – Create Customer User

  Registers a new **customer** user in the system.

  **URL**  
  `POST {{local_base_url}}/v1/register/`

  **Method**  
  `POST`

  **Required body (x-www-form-urlencoded)**

  - `username` – Customer username (must be unique)
      
  - `email` – Customer email address (must be unique)
      
  - `password` – Account password
      
  - `user_gender` – Gender of the user (e.g. `MALE, FEMALE, OTHER`)
      
  - `user_type` – Type of user (e.g. `customer or business`)
      

  **Typical successful response**

  - **Status:** `201 Created`
      
  - **Body (JSON):**
      
      - `success` – Boolean, `true` when the user is created
          
      - `user.mail` – Email of the created user
          
      - `message` – Human‑readable confirmation message (e.g. `"User created successfully. ✅"`)
          

  **Notes**

  - `username` and `email` **must be unique**; registration will fail if either already exists.
