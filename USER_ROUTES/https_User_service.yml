info:
  name: https_User_service
  type: http
  seq: 1

http:
  method: GET
  url: "{{local_base_url}}/user/u/me/"
  body:
    type: form-urlencoded
  auth:
    type: bearer
    token: "{{access_token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          pm.response.to.be.json;
        });

        test("active is true", function () {
          const jsonData = res.getBody();
          expect(jsonData).to.have.property("active", true);
        });

        test("data.user_id exists", function () {
          const jsonData = res.getBody();
          expect(jsonData).to.have.nested.property("data.user_id");
          expect(jsonData.data.user_id).to.be.a("string");
          expect(jsonData.data.user_id.length).to.be.above(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

