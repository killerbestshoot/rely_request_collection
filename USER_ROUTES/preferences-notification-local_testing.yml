http:
  method: PATCH
  url: "{{local_base_url}}/user/u/preferences/notification/"
  body:
    type: form-urlencoded
    data:
      - name: sms_enabled
        value: "TRUE"
      - name: push_enabled
        value: "TRUE"
      - name: transaction_received
        value: "true"
      - name: login_alert
        value: "true"
