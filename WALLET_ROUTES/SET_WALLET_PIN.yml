info:
  name: SET_WALLET_PIN
  type: http
  seq: 4

http:
  method: POST
  url: "{{local_base_url}}/v1/wallet/set-pin/"
  body:
    type: form-urlencoded
    data:
      - name: pin
        value: "0016"
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

